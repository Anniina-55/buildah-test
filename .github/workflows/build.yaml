name: Build and push scratch image

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Buildah + Go)
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah golang-go

      - name: Normalize image name to match repo name
        run: |
          IMAGE_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            buildah login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build Go binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
          go build -o server main.go

      - name: Create container and build image
        run: |
          set -e

          container=$(buildah from scratch)
          echo "CONTAINER=$container" >> $GITHUB_ENV

          mountpoint=$(buildah mount $container)

          mkdir -p $mountpoint/bin
          mkdir -p $mountpoint/www

          # copy static files (must exist in repo)
          cp -r www/* $mountpoint/www/

          # copy server binary
          cp server $mountpoint/bin/server
          chmod +x $mountpoint/bin/server

          buildah config --cmd "/bin/server" $container

          buildah commit $container $IMAGE_NAME

      - name: Tag image
        run: |
          IMAGE="${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}:latest"
          echo "FULL_IMAGE=$IMAGE" >> $GITHUB_ENV
          buildah tag $IMAGE_NAME $IMAGE

      - name: Push image to GHCR
        run: |
          buildah push $FULL_IMAGE

      - name: Show images
        run: |
          buildah images
