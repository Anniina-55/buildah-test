name: Build and push scratch image

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set image name (lowercase repo name)
        run: |
          IMAGE_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Set full image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          FULL_IMAGE="${REGISTRY}/${OWNER}/${IMAGE_NAME}:latest"
          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_ENV

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            buildah login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build Go binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
          go build -o server main.go

      - name: Build scratch container image
        run: |
          set -e

          buildah unshare bash -c '
            set -e

            container=$(buildah from scratch)
            mountpoint=$(buildah mount $container)

            mkdir -p $mountpoint/bin
            mkdir -p $mountpoint/www

            # copy static files
            cp -r www/* $mountpoint/www/

            # copy server binary
            cp server $mountpoint/bin/server
            chmod +x $mountpoint/bin/server

            # set startup command
            buildah config --cmd "/bin/server" $container

            # commit directly to final image name
            buildah commit $container "$FULL_IMAGE"
          '

      - name: Push image
        run: |
          buildah push "$FULL_IMAGE"

      - name: Verify push result
        run: |
          echo "Pushed image: $FULL_IMAGE"
