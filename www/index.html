<!DOCTYPE html>
<html lang="en">
<!-- This is just example, make your own content -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buildah scratch demo</title>
</head>
<style>
    body {
        margin: 0;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;

        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #052e2b, #0f172a);
        color: #d1fae5;
        text-align: center;
    }

    h1 {
        color: #34d399;
        margin-bottom: 10px;
    }

    p {
        font-size: 18px;
        color: #a7f3d0;
        margin-bottom: 20px;
    }

    .card {
        text-align: center;
        padding: 40px;
        border-radius: 16px;

        background: rgba(16, 185, 129, 0.07);
        backdrop-filter: blur(12px);
           -webkit-backdrop-filter: blur(12px);

        border: 1px solid rgba(255, 255, 255, 0.1);

        box-shadow: 0 20px 40px rgba(0,0,0,0.5);

        max-width: 500px;
        }
     .btn {
	padding: 8px;
	border-radius: 16px;
	background: rgba(16, 185, 129, 0.05);
	color: white;
	font-size: 16px;
	margin-top: 12px;
     }
     .timeDisplay {
	color: white;
        font-size: 16px;
     }
	

</style>
<body>
    <div class="card">

        <h1>Hello from Buildah scratch image!</h1>
        <p>This page is served from a manually created scratch image.</p>

    	
	<button onclick="getTime()" class="btn">Get server time</button>
	<p id="time" class="timeDisplay"></p>

	<script>
		function getTime() {
  			fetch("/api/time")
    			.then(r => r.text())
    			.then(data => {
      				document.getElementById("time").innerText = data;
    			});
		}
	</script>	
    </div>
</body>
</html>
