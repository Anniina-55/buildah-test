<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buildah container demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">

        <h1>Hello from Buildah scratch image container!</h1>
          <p>This page is served from a manually created scratch image.</p>
       	  <img src="./containers.png" alt="Layers">

		<table>
		<tr>
			<td id="greeting">What's your name?</td>
			<td>
			<input id="nameInput" type="text" />
			</td>
		</tr>
		<tr>
			<td id="output" class="output"></td>
		</tr>
		</table>

		<br>
		<button class="btn" onclick="surprise()">Surprise me</button>
		<br>

		<label for="timezone">Timezone:</label>
		<select id="timezone" onchange="updateTime()">
			<option value="local">Local</option>
			<option value="UTC">UTC</option>
			<option value="Europe/London">London</option>
			<option value="America/New_York">New York</option>
			<option value="Asia/Shanghai">Shanghai</option>
			<option value="Australia/Sydney">Canberra</option>
		</select>
			
		<p id="time" class="timeDisplay"></p>

		<div class="serverBox">
		<h3>Server info</h3>
		<pre id="serverInfo">Loading...</pre>
		</div>
		<button class="btn" onclick=loadServerInfo()>Refresh</button>

	</div>

	<script>

		const BASE_URL = "http://localhost:5005/proxy/go-web-app"

		window.addEventListener("load", () => {
			document.getElementById("nameInput").value = "";
			document.getElementById("output").textContent = "";
		});

		const input = document.getElementById("nameInput");
		const output = document.getElementById("output");

		function surprise() {
    			const name = document.getElementById("nameInput").value;
    			window.location.href = "/surprise.html?name=" + encodeURIComponent(name);
		}

		async function updateTime() {
    			const res = await fetch(BASE_URL + "/api/time");
    			const utcString = await res.text();
    			const date = new Date(utcString);

    			const timeZone = document.getElementById("timezone").value;

    			let formatted;

    			if (timeZone === "local") {
        			formatted = date.toLocaleString();
    			} else {
        			formatted = date.toLocaleString("en-GB", {
            				timeZone: timeZone,
            				year: "numeric",
            				month: "2-digit",
            				day: "2-digit",
            				hour: "2-digit",
            				minute: "2-digit",
            				second: "2-digit"
        			});
    			}
				document.getElementById("time").textContent = formatted;
			}


		async function loadServerInfo() {
			try {
				const res = await fetch(BASE_URL + "/api/info");
				const data = await res.json(); 
				document.getElementById("serverInfo").textContent = JSON.stringify(data, null, 2);
			} catch (err) {
				document.getElementById("serverInfo").textContent = "Error loading server info";
			}
		}
		document.getElementById("timezone").addEventListener("change", updateTime);
		// initial load
		updateTime();
		loadServerInfo();

	</script>	
</body>
</html>
